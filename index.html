<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vía Store & Service</title>
    <!-- Bootstrap CSS para diseño rápido en celulares -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
    <style>
        .card-producto { transition: transform 0.2s, box-shadow 0.2s; }
        .card-producto:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.15) !important; }
        .btn-modo-oscuro {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1050;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
        }
        /* Estilo para que las imágenes del carrusel mantengan la proporción */
        .img-carrusel-detalle {
            height: 350px;
            object-fit: contain;
            background-color: rgba(0,0,0,0.03);
        }
    </style>
</head>
<body class="bg-light text-dark">

    <!-- Botón Flotante Modo Oscuro -->
    <button id="btn-toggle-oscuro" class="btn btn-dark shadow-lg btn-modo-oscuro" title="Cambiar tema">🌙</button>

    <!-- Navegación -->
    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">VÍA STORE & SERVICE 🛒🔧</a>
            <button class="btn btn-success fw-bold" data-bs-toggle="modal" data-bs-target="#modalCarrito">
                🛒 Mi Carrito (<span id="contador-carrito">0</span>)
            </button>
        </div>
    </nav>

    <!-- Banner Principal -->
    <div class="container my-4">
        <div class="card p-4 shadow-sm text-center border-0 bg-body">
            <h1 class="display-6 fw-bold">Catálogo Digital</h1>
            <p class="text-muted">Importaciones, novedades y Servicio Técnico Especializado en Lince.</p>
            <span class="badge bg-danger p-2 fs-6 w-auto mx-auto">🚚 Envío GRATIS a partir de S/ 100</span>
        </div>
    </div>

    <!-- Barra de Búsqueda y Filtros -->
    <div class="container mb-4">
        <div class="row g-3">
            <div class="col-12 col-md-6">
                <input type="text" id="input-busqueda" class="form-control form-control-lg shadow-sm bg-body" placeholder="🔍 Buscar herramientas, mouses, servicios...">
            </div>
            <div class="col-12 col-md-6 d-flex gap-2 flex-wrap align-items-center justify-content-md-end">
                <button class="btn btn-dark shadow-sm btn-filtro active" onclick="filtrarPorCategoria('todos')">Todos</button>
                <button class="btn btn-outline-dark shadow-sm btn-filtro" onclick="filtrarPorCategoria('herramientas')">Herramientas</button>
                <button class="btn btn-outline-dark shadow-sm btn-filtro" onclick="filtrarPorCategoria('tecnologia')">Tecnología</button>
                <button class="btn btn-outline-dark shadow-sm btn-filtro" onclick="filtrarPorCategoria('servicio')">Servicios técnicos</button>
            </div>
        </div>
    </div>

    <!-- Contenedor de Productos -->
    <div class="container mb-5">
        <div class="row row-cols-1 row-cols-md-3 g-4" id="contenedor-productos"></div>
    </div>

    <!-- 🔍 NUEVO: Modal de Detalles / Galería del Producto -->
    <div class="modal fade" id="modalDetalleProducto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-body">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title fw-bold" id="detalle-nombre-producto">Detalles del Producto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <!-- Carrusel Dinámico de Fotos -->
                    <div id="carruselProducto" class="carousel slide carousel-dark" data-bs-ride="false">
                        <div class="carousel-inner" id="carrusel-imagenes-internas">
                            <!-- Se llena con JS -->
                        </div>
                        <button class="carousel-control-prev" type="button" data-bs-target="#carruselProducto" data-bs-slide="prev">
                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Anterior</span>
                        </button>
                        <button class="carousel-control-next" type="button" data-bs-target="#carruselProducto" data-bs-slide="next">
                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Siguiente</span>
                        </button>
                    </div>
                    <!-- Información abajo del Carrusel -->
                    <div class="p-3">
                        <p class="text-muted" id="detalle-descripcion-producto"></p>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="fs-3 fw-bold text-success" id="detalle-precio-producto"></span>
                            <div id="contenedor-boton-modal-agregar"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal del Carrito -->
    <div class="modal fade" id="modalCarrito" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-body">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title fw-bold">Tu Pedido</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="items-carrito">
                        <p class="text-muted text-center my-3">El carrito está vacío.</p>
                    </div>
                    
                    <div id="seccion-entrega" class="mt-3 d-none">
                        <label for="select-entrega" class="form-label fw-bold text-secondary small">📍 CÓMO DESEAS RECIBIR TU PEDIDO:</label>
                        <select class="form-select bg-body border-secondary-subtle" id="select-entrega">
                            <option value="Agencia (Olva/Shalom) - ¡ENVÍO GRATIS A TODO LIMA!">📦 Recojo en Agencia Olva o Shalom (¡Envío Gratis a todo Lima!)</option>
                            <option value="Delivery a Domicilio Directo (Recargo según App)">🛵 Entrega a Domicilio Exacto (Costo extra según Aplicativo)</option>
                            <option value="Punto de Encuentro a Coordinar (Aplica recargo de movilidad)">🤝 Encuentro en Punto de Entrega (Aplica recargo de movilidad)</option>
                        </select>
                    </div>

                    <hr>
                    <div class="d-flex justify-content-between fw-bold fs-5 mb-3">
                        <span>Total:</span>
                        <span>S/ <span id="total-carrito">0.00</span></span>
                    </div>
                </div>
                <div class="modal-footer flex-column">
                    <button type="button" class="btn btn-success w-100 fw-bold py-2 fs-5" id="btn-enviar-whatsapp">Confirmar por WhatsApp 💬</button>
                    <button type="button" class="btn btn-secondary w-100" data-bs-dismiss="modal">Seguir comprando</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Tu archivo lógico -->
    <script src="script.js"></script>
</body>
</html>
